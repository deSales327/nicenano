name: Build Firmware

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: zmkfirmware/zmk-build-arm:stable
    strategy:
      fail-fast: false
      matrix:
        include:
          - board: nice_nano
            shield: tps65_breadboard
            artifact_name: tps65-breadboard
          - board: nice_nano
            shield: "sofle_left tps65_central"
            artifact_name: sofle-left-tps65-central
          - board: nice_nano
            shield: sofle_right
            artifact_name: sofle-right-no-trackpad
          - board: nice_nano
            shield: "sofle_left tps65_listener"
            artifact_name: sofle-left-trackpad-listener
          - board: nice_nano
            shield: "sofle_right tps65_peripheral"
            artifact_name: sofle-right-tps65-peripheral
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Create build directory
        run: echo "build_dir=$(mktemp -d)" >> "$GITHUB_ENV"

      - name: West Init
        run: west init -l config

      - name: West Update
        run: west update --fetch-opt=--filter=tree:0

      - name: Prepare repo-root module metadata
        run: sh ./scripts/prepare-module.sh

      - name: West Zephyr Export
        run: west zephyr-export

      - name: Build ${{ matrix.artifact_name }}
        shell: bash
        env:
          BOARD: ${{ matrix.board }}
          SHIELD: ${{ matrix.shield }}
        run: |
          set -euo pipefail
          cmake_args=(
            "-DZMK_CONFIG=${GITHUB_WORKSPACE}/config"
            "-DZMK_EXTRA_MODULES=${GITHUB_WORKSPACE}"
          )
          if [ -n "${SHIELD}" ]; then
            cmake_args+=("-DSHIELD=${SHIELD}")
          fi
          west build -p -s zmk/app -d "${build_dir}" -b "${BOARD}" -- "${cmake_args[@]}"

      - name: Rename artifacts
        shell: bash
        env:
          ARTIFACT_NAME: ${{ matrix.artifact_name }}
        run: |
          set -euo pipefail
          mkdir -p "${build_dir}/artifacts"
          if [ -f "${build_dir}/zephyr/zmk.uf2" ]; then
            cp "${build_dir}/zephyr/zmk.uf2" "${build_dir}/artifacts/${ARTIFACT_NAME}.uf2"
          elif [ -f "${build_dir}/zephyr/zmk.bin" ]; then
            cp "${build_dir}/zephyr/zmk.bin" "${build_dir}/artifacts/${ARTIFACT_NAME}.bin"
          else
            echo "Expected zmk.uf2 or zmk.bin not found" >&2
            exit 1
          fi

      - name: Upload ${{ matrix.artifact_name }}
        uses: actions/upload-artifact@v4
        with:
          name: artifact-${{ matrix.artifact_name }}
          path: ${{ env.build_dir }}/artifacts
